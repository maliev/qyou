name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check backend types
        run: cd apps/backend && npm ci && npx tsc --noEmit

      - name: Check frontend types
        run: cd apps/frontend && npm ci && npx tsc --noEmit
